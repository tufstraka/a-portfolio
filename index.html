<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keith Kadima | Software Engineer & Creative Developer</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Keith Kadima - Software Engineer specializing in full-stack development, 3D web experiences, and creative coding. Based in Nairobi, Kenya.">
    <meta name="keywords" content="Keith Kadima, Software Engineer, Web Developer, Three.js, React, Full Stack, Nairobi, Kenya">
    <meta name="author" content="Keith Kadima">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://keithkadima.dev">
    <meta property="og:title" content="Keith Kadima | Software Engineer & Creative Developer">
    <meta property="og:description" content="Explore my interactive 3D portfolio - drive through my professional journey.">
    <meta property="og:image" content="https://keithkadima.dev/preview.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Keith Kadima | Software Engineer">
    <meta name="twitter:description" content="Interactive 3D portfolio experience">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Color System */
            --color-primary: #0066FF;
            --color-primary-dark: #0052CC;
            --color-secondary: #00D4AA;
            --color-accent: #FF6B35;
            --color-background: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-text: #1E293B;
            --color-text-secondary: #64748B;
            --color-border: #E2E8F0;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            /* Spacing */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            
            /* Transitions */
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --transition-slow: 350ms ease;
            
            /* Border Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
        }
        
        /* Reset & Base */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-background);
            color: var(--color-text);
            overflow: hidden;
            line-height: 1.6;
        }
        
        /* Game Container */
        #gameContainer {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity var(--transition-slow), visibility var(--transition-slow);
        }
        
        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .loading-content {
            text-align: center;
            color: white;
        }
        
        .loading-logo {
            font-size: 3rem;
            margin-bottom: var(--space-6);
            animation: float 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .loading-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: var(--space-2);
            letter-spacing: -0.025em;
        }
        
        .loading-subtitle {
            font-size: 0.875rem;
            color: #94A3B8;
            margin-bottom: var(--space-8);
        }
        
        .loading-bar-container {
            width: 280px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            border-radius: var(--radius-full);
            transition: width var(--transition-normal);
        }
        
        .loading-tip {
            margin-top: var(--space-6);
            font-size: 0.75rem;
            color: #64748B;
        }
        
        /* HUD - Controls Panel */
        #controlsPanel {
            position: fixed;
            top: var(--space-4);
            left: var(--space-4);
            background: var(--color-surface);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            max-width: 240px;
            border: 1px solid var(--color-border);
        }
        
        .controls-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-3);
        }
        
        .controls-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
        }
        
        .controls-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: var(--space-1);
            border-radius: var(--radius-sm);
            transition: background var(--transition-fast);
        }
        
        .controls-toggle:hover {
            background: var(--color-background);
        }
        
        .controls-list {
            font-size: 0.8125rem;
            color: var(--color-text-secondary);
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-1) 0;
        }
        
        .control-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.75rem;
            height: 1.5rem;
            padding: 0 var(--space-2);
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--color-text);
        }
        
        #controlsPanel.collapsed .controls-list {
            display: none;
        }
        
        /* Speed Display */
        #speedDisplay {
            position: fixed;
            bottom: var(--space-4);
            left: var(--space-4);
            background: var(--color-surface);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            border: 1px solid var(--color-border);
        }
        
        .speed-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text);
            line-height: 1;
        }
        
        .speed-unit {
            font-size: 0.75rem;
            color: var(--color-text-secondary);
            margin-left: var(--space-1);
        }
        
        .speed-boost {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            margin-left: var(--space-2);
            padding: var(--space-1) var(--space-2);
            background: linear-gradient(135deg, #FF6B35, #FF8F6B);
            color: white;
            font-size: 0.625rem;
            font-weight: 600;
            border-radius: var(--radius-full);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Minimap */
        #minimapContainer {
            position: fixed;
            bottom: var(--space-4);
            right: var(--space-4);
            z-index: 100;
        }
        
        #minimap {
            width: 180px;
            height: 180px;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-border);
        }
        
        /* Section Indicator */
        #sectionIndicator {
            position: fixed;
            bottom: calc(var(--space-4) + 70px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-surface);
            padding: var(--space-3) var(--space-6);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-xl);
            z-index: 100;
            display: none;
            border: 1px solid var(--color-border);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .section-indicator-content {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .section-indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .section-indicator-title {
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .section-indicator-hint {
            font-size: 0.75rem;
            color: var(--color-text-secondary);
        }
        
        /* Modal */
        #modalOverlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #modalOverlay.active {
            display: flex;
        }
        
        #modal {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            max-width: 640px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .modal-title-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: var(--space-2);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: var(--color-background);
            color: var(--color-text);
        }
        
        .modal-body {
            padding: var(--space-6);
            overflow-y: auto;
            max-height: calc(80vh - 140px);
        }
        
        .modal-content {
            font-size: 0.9375rem;
            line-height: 1.7;
        }
        
        .modal-content strong {
            color: var(--color-text);
            font-weight: 600;
        }
        
        .modal-content em {
            color: var(--color-text-secondary);
            font-style: normal;
        }
        
        .modal-section {
            margin-bottom: var(--space-6);
        }
        
        .modal-section:last-child {
            margin-bottom: 0;
        }
        
        .modal-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-3);
        }
        
        .modal-list {
            list-style: none;
        }
        
        .modal-list li {
            padding: var(--space-2) 0;
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
        }
        
        .modal-list li::before {
            content: '→';
            color: var(--color-primary);
            font-weight: 600;
        }
        
        .modal-footer {
            padding: var(--space-4) var(--space-6);
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: flex-end;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-6);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
        }
        
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--color-primary-dark);
        }
        
        /* Settings Button */
        #settingsBtn {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-3);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--color-text);
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }
        
        #settingsBtn:hover {
            background: var(--color-background);
            box-shadow: var(--shadow-md);
        }
        
        /* Settings Panel */
        #settingsPanel {
            position: fixed;
            top: calc(var(--space-4) + 48px);
            right: var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            z-index: 100;
            width: 240px;
            display: none;
            box-shadow: var(--shadow-lg);
        }
        
        #settingsPanel.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        
        .settings-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: var(--space-4);
        }
        
        .settings-group {
            margin-bottom: var(--space-4);
        }
        
        .settings-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-2);
        }
        
        .settings-select {
            width: 100%;
            padding: var(--space-2) var(--space-3);
            font-family: inherit;
            font-size: 0.8125rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-background);
            color: var(--color-text);
            cursor: pointer;
            transition: border-color var(--transition-fast);
        }
        
        .settings-select:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        
        /* FPS Counter */
        #fpsCounter {
            position: fixed;
            bottom: var(--space-4);
            left: calc(var(--space-4) + 140px);
            background: var(--color-surface);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
            z-index: 100;
        }
        
        /* Mobile Controls */
        #mobileControls {
            display: none;
            position: fixed;
            bottom: var(--space-6);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            gap: var(--space-4);
        }
        
        .mobile-joystick {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            border: 2px solid var(--color-border);
            position: relative;
        }
        
        .mobile-joystick-inner {
            width: 50px;
            height: 50px;
            background: var(--color-primary);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            #controlsPanel {
                display: none;
            }
            
            #mobileControls {
                display: flex;
            }
            
            #minimap {
                width: 120px;
                height: 120px;
            }
            
            #modal {
                max-height: 90vh;
                margin: var(--space-2);
            }
            
            .modal-body {
                max-height: calc(90vh - 140px);
            }
        }
        
        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Focus states */
        :focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }
        
        /* Print styles */
        @media print {
            body * {
                visibility: hidden;
            }
            
            #modal, #modal * {
                visibility: visible;
            }
            
            #modal {
                position: absolute;
                left: 0;
                top: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">🚗</div>
            <h1 class="loading-title">Keith Kadima</h1>
            <p class="loading-subtitle">Loading Portfolio Experience...</p>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <p class="loading-tip">Use WASD or Arrow Keys to explore</p>
        </div>
    </div>
    
    <!-- Game Container -->
    <div id="gameContainer"></div>
    
    <!-- Controls Panel -->
    <div id="controlsPanel">
        <div class="controls-header">
            <span class="controls-title">Controls</span>
            <button class="controls-toggle" id="controlsToggle" aria-label="Toggle controls">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="controls-list">
            <div class="control-item">
                <span class="control-key">WASD</span>
                <span>Drive / Move</span>
            </div>
            <div class="control-item">
                <span class="control-key">SPACE</span>
                <span>Enter Section</span>
            </div>
            <div class="control-item">
                <span class="control-key">SHIFT</span>
                <span>Boost</span>
            </div>
            <div class="control-item">
                <span class="control-key">E</span>
                <span>Enter/Exit Vehicle</span>
            </div>
            <div class="control-item">
                <span class="control-key">C</span>
                <span>Change Camera</span>
            </div>
        </div>
    </div>
    
    <!-- Speed Display -->
    <div id="speedDisplay">
        <span class="speed-value" id="speedValue">0</span>
        <span class="speed-unit">km/h</span>
        <span class="speed-boost" id="speedBoost" style="display: none;">🚀 BOOST</span>
    </div>
    
    <!-- Section Indicator -->
    <div id="sectionIndicator">
        <div class="section-indicator-content">
            <span class="section-indicator-dot" id="indicatorDot"></span>
            <span class="section-indicator-title" id="indicatorTitle"></span>
            <span class="section-indicator-hint">Press SPACE to enter</span>
        </div>
    </div>
    
    <!-- Minimap -->
    <div id="minimapContainer">
        <canvas id="minimap" width="180" height="180"></canvas>
    </div>
    
    <!-- FPS Counter -->
    <div id="fpsCounter">60 FPS</div>
    
    <!-- Settings Button -->
    <button id="settingsBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13.5 8C13.5 7.66 13.46 7.33 13.4 7.01L15 5.79L13.5 3.21L11.63 3.91C11.14 3.53 10.59 3.22 10 3.01L9.67 1H6.33L6 3.01C5.41 3.22 4.86 3.53 4.37 3.91L2.5 3.21L1 5.79L2.6 7.01C2.54 7.33 2.5 7.66 2.5 8C2.5 8.34 2.54 8.67 2.6 8.99L1 10.21L2.5 12.79L4.37 12.09C4.86 12.47 5.41 12.78 6 12.99L6.33 15H9.67L10 12.99C10.59 12.78 11.14 12.47 11.63 12.09L13.5 12.79L15 10.21L13.4 8.99C13.46 8.67 13.5 8.34 13.5 8Z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Settings
    </button>
    
    <!-- Settings Panel -->
    <div id="settingsPanel">
        <h3 class="settings-title">Display Settings</h3>
        <div class="settings-group">
            <label class="settings-label">Quality</label>
            <select class="settings-select" id="qualitySelect">

        // ============================================
        // GAME ENGINE CLASS

        class PortfolioEngine {
            constructor() {
                // Core components
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.composer = null;
                this.clock = new THREE.Clock();
                
                // Game objects
                this.car = null;
                this.character = null;
                this.sections = [];
                this.buildings = [];
                
                // State
                this.state = {
                    playerMode: 'driving',
                    cameraMode: 'follow',
                    cameraDistance: CONFIG.DEFAULT_CAMERA_DISTANCE,
                    cameraHeight: CONFIG.DEFAULT_CAMERA_HEIGHT,
                    carSpeed: 0,
                    currentSection: null,
                    keys: {},
                    isMobile: this.detectMobile(),
                    quality: this.detectQuality()
                };
                
                // Performance
                this.frameCount = 0;
                this.lastFpsTime = performance.now();
                this.fps = 60;
                
                // Bind methods
                this.animate = this.animate.bind(this);
                this.onResize = this.onResize.bind(this);
                this.onKeyDown = this.onKeyDown.bind(this);
                this.onKeyUp = this.onKeyUp.bind(this);
            }
            
            detectMobile() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            }
            
            detectQuality() {
                if (this.detectMobile()) return 'low';
                if (navigator.deviceMemory && navigator.deviceMemory < 4) return 'medium';
                if (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) return 'medium';
                return 'high';
            }
            
            async init() {
                this.updateLoadingProgress(10);
                
                await this.initRenderer();
                this.updateLoadingProgress(30);
                
                await this.createScene();
                this.updateLoadingProgress(50);
                
                await this.createVehicle();
                this.updateLoadingProgress(60);
                
                this.createCharacter();
                this.updateLoadingProgress(70);
                
                this.createPortfolioSections();
                this.updateLoadingProgress(85);
                
                this.setupEventListeners();
                this.updateLoadingProgress(95);
                
                // Position car at start
                this.car.position.set(0, 0, 50);
                this.camera.position.set(0, 10, 30);
                
                // Final loading
                this.updateLoadingProgress(100);
                
                // Hide loading screen
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    this.animate();
                }, 500);
                
                // Load non-critical assets
                setTimeout(() => this.loadSecondaryAssets(), 1000);
            }
            
            updateLoadingProgress(percent) {
                document.getElementById('loadingBar').style.width = `${percent}%`;
            }
            
            async initRenderer() {
                const container = document.getElementById('gameContainer');
                
                // Scene
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0xE6F0FF, 0.002);
                
                // Camera
                this.camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    this.state.quality === 'high' ? 800 : 400
                );
                
                // Renderer
                this.renderer = new THREE.WebGLRenderer({
                    antialias: this.state.quality !== 'low',
                    powerPreference: 'high-performance',
                    precision: this.state.isMobile ? 'mediump' : 'highp',
                    stencil: false
                });
                
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, this.state.isMobile ? 1 : 2));
                this.renderer.shadowMap.enabled = this.state.quality !== 'low';
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 0.8;
                this.renderer.setClearColor(0xE8F4FF);
                
                container.appendChild(this.renderer.domElement);
                
                // Post-processing
                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(new RenderPass(this.scene, this.camera));
                
                // FXAA (skip on mobile)
                if (!this.state.isMobile) {
                    const fxaaPass = new ShaderPass(FXAAShader);
                    const pixelRatio = this.renderer.getPixelRatio();
                    fxaaPass.material.uniforms['resolution'].value.x = 1 / (window.innerWidth * pixelRatio);
                    fxaaPass.material.uniforms['resolution'].value.y = 1 / (window.innerHeight * pixelRatio);
                    this.composer.addPass(fxaaPass);
                }
                
                // Bloom
                this.bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    0.15, 0.3, 0.95
                );
                this.composer.addPass(this.bloomPass);
            }
            
            async createScene() {
                // Lighting
                const ambient = new THREE.AmbientLight(0xCCDDFF, 0.6);
                this.scene.add(ambient);
                
                const sun = new THREE.DirectionalLight(0xFFFAF0, 1.2);
                sun.position.set(50, 100, 50);
                
                if (this.state.quality !== 'low') {
                    sun.castShadow = true;
                    sun.shadow.mapSize.width = 2048;
                    sun.shadow.mapSize.height = 2048;
                    
                    const d = 100;
                    sun.shadow.camera.left = -d;
                    sun.shadow.camera.right = d;
                    sun.shadow.camera.top = d;
                    sun.shadow.camera.bottom = -d;
                    sun.shadow.camera.near = 1;
                    sun.shadow.camera.far = 300;
                }
                
                this.scene.add(sun);
                
                // Ground
                const groundGeometry = new THREE.PlaneGeometry(1000, 1000, 50, 50);
                const groundMaterial = new THREE.MeshStandardMaterial({
                    color: 0x7CB342,
                    roughness: 0.9,
                    metalness: 0.1
                });
                
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -0.1;
                ground.receiveShadow = this.state.quality !== 'low';
                this.scene.add(ground);
                
                // Sky
                if (this.state.quality !== 'low') {
                    const sky = new Sky();
                    sky.scale.setScalar(10000);
                    this.scene.add(sky);
                    
                    const skyUniforms = sky.material.uniforms;
                    skyUniforms['turbidity'].value = 6;
                    skyUniforms['rayleigh'].value = 1;
                    skyUniforms['mieCoefficient'].value = 0.003;
                    skyUniforms['mieDirectionalG'].value = 0.7;
                    
                    const sunPos = new THREE.Vector3();
                    const phi = THREE.MathUtils.degToRad(50);
                    const theta = THREE.MathUtils.degToRad(160);
                    sunPos.setFromSphericalCoords(1, phi, theta);
                    skyUniforms['sunPosition'].value.copy(sunPos);
                }
            }
            
            async createVehicle() {
                const carGroup = new THREE.Group();
                
                // Body
                const bodyGeometry = new THREE.BoxGeometry(2.2, 0.8, 5);
                const bodyMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1E40AF,
                    metalness: 0.8,
                    roughness: 0.2
                });
                
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.position.y = 0.5;
                body.castShadow = this.state.quality !== 'low';
                carGroup.add(body);
                
                // Roof
                const roofGeometry = new THREE.BoxGeometry(2, 0.8, 2.6);
                const roof = new THREE.Mesh(roofGeometry, bodyMaterial);
                roof.position.set(0, 1.3, 0.1);
                roof.castShadow = this.state.quality !== 'low';
                carGroup.add(roof);
                
                // Wheels
                const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
                const wheelMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1F2937,
                    roughness: 0.9
                });
                
                const wheelPositions = [
                    { x: -1.2, y: 0.4, z: 1.6 },
                    { x: 1.2, y: 0.4, z: 1.6 },
                    { x: -1.2, y: 0.4, z: -1.6 },
                    { x: 1.2, y: 0.4, z: -1.6 }
                ];
                
                wheelPositions.forEach(pos => {
                    const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                    wheel.position.set(pos.x, pos.y, pos.z);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.castShadow = this.state.quality !== 'low';
                    carGroup.add(wheel);
                });
                
                // Windshields
                const glassGeometry = new THREE.PlaneGeometry(1.8, 0.9);
                const glassMaterial = new THREE.MeshStandardMaterial({
                    color: 0x88AACC,
                    transparent: true,
                    opacity: 0.7,
                    side: THREE.DoubleSide
                });
                
                const frontGlass = new THREE.Mesh(glassGeometry, glassMaterial);
                frontGlass.position.set(0, 1.15, 1.25);
                frontGlass.rotation.x = Math.PI / 4;
                carGroup.add(frontGlass);
                
                const rearGlass = new THREE.Mesh(glassGeometry, glassMaterial);
                rearGlass.position.set(0, 1.15, -1.25);
                rearGlass.rotation.x = -Math.PI / 4;
                carGroup.add(rearGlass);
                
                // Headlights
                const headlightGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 12);
                const headlightMaterial = new THREE.MeshStandardMaterial({
                    color: 0xFFFFCC,
                    emissive: 0xFFFFCC,
                    emissiveIntensity: 0.3
                });
                
                [-0.8, 0.8].forEach(x => {
                    const headlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
                    headlight.position.set(x, 0.6, 2.55);
                    headlight.rotation.x = Math.PI / 2;
                    carGroup.add(headlight);
                });
                
                this.car = carGroup;
                this.scene.add(this.car);
            }
            
            createCharacter() {
                const characterGroup = new THREE.Group();
                
                // Body
                const bodyGeometry = new THREE.CapsuleGeometry(0.3, 0.8, 4, 8);
                const bodyMaterial = new THREE.MeshStandardMaterial({
                    color: 0x3B82F6,
                    roughness: 0.8
                });
                
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.position.y = 1.1;
                body.castShadow = this.state.quality !== 'low';
                characterGroup.add(body);
                
                // Head
                const headGeometry = new THREE.SphereGeometry(0.25, 16, 8);
                const head = new THREE.Mesh(headGeometry, bodyMaterial);
                head.position.y = 1.8;
                head.castShadow = this.state.quality !== 'low';
                characterGroup.add(head);
                
                this.character = characterGroup;
                this.character.visible = false;
                this.scene.add(this.character);
            }
            
            createPortfolioSections() {
                Object.entries(PORTFOLIO_DATA).forEach(([title, data]) => {
                    const sectionGroup = new THREE.Group();
                    
                    // Building
                    const buildingGeometry = new THREE.BoxGeometry(12, 25, 12);
                    const buildingMaterial = new THREE.MeshStandardMaterial({
                        color: data.color,
                        roughness: 0.6,
                        metalness: 0.4
                    });
                    
                    const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                    building.position.y = 12.5;
                    building.castShadow = this.state.quality !== 'low';
                    building.receiveShadow = this.state.quality !== 'low';
                    sectionGroup.add(building);
                    
                    // Roof accent
                    const roofGeometry = new THREE.BoxGeometry(13, 1, 13);
                    const roofMaterial = new THREE.MeshStandardMaterial({
                        color: new THREE.Color(data.color).multiplyScalar(0.7),
                        roughness: 0.5,
                        metalness: 0.6
                    });
                    
                    const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                    roof.position.y = 25.5;
                    roof.castShadow = this.state.quality !== 'low';
                    sectionGroup.add(roof);
                    
                    // Floating label
                    const labelCanvas = document.createElement('canvas');
                    labelCanvas.width = 512;
                    labelCanvas.height = 96;
                    const ctx = labelCanvas.getContext('2d');
                    
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, 512, 96);
                    
                    ctx.fillStyle = '#' + new THREE.Color(data.color).getHexString();
                    ctx.font = 'bold 48px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(title, 256, 48);
                    
                    const labelTexture = new THREE.CanvasTexture(labelCanvas);
                    const labelMaterial = new THREE.MeshBasicMaterial({
                        map: labelTexture,
                        side: THREE.DoubleSide,
                        transparent: true
                    });
                    
                    const labelGeometry = new THREE.PlaneGeometry(8, 1.5);
                    const label = new THREE.Mesh(labelGeometry, labelMaterial);
                    label.position.set(0, 28, 0);
                    sectionGroup.add(label);
                    
                    // Entrance glow
                    const entranceGeometry = new THREE.BoxGeometry(4, 6, 0.5);
                    const entranceMaterial = new THREE.MeshStandardMaterial({
                        color: data.color,
                        transparent: true,
                        opacity: 0.8,
                        emissive: data.color,
                        emissiveIntensity: 0.3
                    });
                    
                    const entrance = new THREE.Mesh(entranceGeometry, entranceMaterial);
                    entrance.position.set(0, 3, 6.25);
                    sectionGroup.add(entrance);
                    
                    // Position
                    sectionGroup.position.set(data.position.x, 0, data.position.z);
                    sectionGroup.userData = { title, content: data.content, color: data.color };
                    
                    this.sections.push(sectionGroup);
                    this.buildings.push(sectionGroup);
                    this.scene.add(sectionGroup);
                });
            }
            
            loadSecondaryAssets() {
                // Trees
                if (this.state.quality !== 'low') {
                    for (let i = 0; i < 40; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 40 + Math.random() * 120;
                        
                        if (Math.abs(Math.sin(angle) * radius) < 15) continue;
                        
                        const x = Math.sin(angle) * radius;
                        const z = Math.cos(angle) * radius;
                        
                        const tree = this.createTree();
                        tree.position.set(x, 0, z);
                        this.scene.add(tree);
                    }
                }
                
                // Particles
                if (this.state.quality === 'high') {
                    this.createParticles();
                }
            }
            
            createTree() {
                const treeGroup = new THREE.Group();
                
                const trunkGeometry = new THREE.CylinderGeometry(0.4, 0.6, 4 + Math.random() * 2, 8);
                const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
                
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.y = trunk.geometry.parameters.height / 2;
                trunk.castShadow = this.state.quality !== 'low';
                treeGroup.add(trunk);
                
                const foliageGeometry = new THREE.SphereGeometry(2.5 + Math.random() * 1.5, 8, 8);
                const foliageMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 });
                
                const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
                foliage.position.y = trunk.geometry.parameters.height + 1.5;
                foliage.castShadow = this.state.quality !== 'low';
                treeGroup.add(foliage);
                
                return treeGroup;
            }
            
            createParticles() {
                const count = 300;
                const positions = new Float32Array(count * 3);
                
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 150;
                    
                    positions[i * 3] = Math.sin(angle) * radius;
                    positions[i * 3 + 1] = Math.random() * 50;
                    positions[i * 3 + 2] = Math.cos(angle) * radius;
                }
                
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                
                const material = new THREE.PointsMaterial({
                    color: 0xFFFFFF,
                    size: 0.15,
                    transparent: true,
                    opacity: 0.4
                });
                
                const particles = new THREE.Points(geometry, material);
                this.scene.add(particles);
            }
            
            setupEventListeners() {
                // Keyboard
                window.addEventListener('keydown', this.onKeyDown);
                window.addEventListener('keyup', this.onKeyUp);
                
                // Resize
                window.addEventListener('resize', this.onResize);
                
                // Mouse wheel for zoom
                window.addEventListener('wheel', (e) => {
                    this.state.cameraDistance += e.deltaY * 0.01;
                    this.state.cameraDistance = Math.max(5, Math.min(30, this.state.cameraDistance));
                });
                
                // UI Controls
                document.getElementById('controlsToggle').addEventListener('click', () => {
                    document.getElementById('controlsPanel').classList.toggle('collapsed');
                });
                
                document.getElementById('settingsBtn').addEventListener('click', () => {
                    document.getElementById('settingsPanel').classList.toggle('active');
                });
                
                document.getElementById('qualitySelect').addEventListener('change', (e) => {
                    this.applyQuality(e.target.value);
                });
                
                document.getElementById('effectsSelect').addEventListener('change', (e) => {
                    this.applyEffects(e.target.value);
                });
                
                // Modal
                document.getElementById('modalClose').addEventListener('click', () => this.closeModal());
                document.getElementById('modalCloseBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('modalOverlay')) {
                        this.closeModal();
                    }
                });
                
                // Set initial quality settings
                document.getElementById('qualitySelect').value = this.state.quality;
            }
            
            onKeyDown(e) {
                this.state.keys[e.code] = true;
                
                // Enter section
                if (e.code === 'Space' && this.state.currentSection) {
                    e.preventDefault();
                    this.openModal(this.state.currentSection.userData);
                }
                
                // Toggle player mode
                if (e.code === 'KeyE') {
                    this.togglePlayerMode();
                }
                
                // Toggle camera
                if (e.code === 'KeyC') {
                    this.toggleCamera();
                }
                
                // Escape to close modal
                if (e.code === 'Escape') {
                    this.closeModal();
                    document.getElementById('settingsPanel').classList.remove('active');
                }
                
                // Prevent default for game keys
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 
                     'KeyW', 'KeyA', 'KeyS', 'KeyD', 'ShiftLeft', 'ShiftRight'].includes(e.code)) {
                    e.preventDefault();
                }
            }
            
            onKeyUp(e) {
                this.state.keys[e.code] = false;
            }
            
            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.composer.setSize(window.innerWidth, window.innerHeight);
            }
            
            togglePlayerMode() {
                if (this.state.playerMode === 'driving') {
                    this.state.playerMode = 'walking';
                    
                    this.character.position.set(
                        this.car.position.x + Math.sin(this.car.rotation.y + Math.PI/2) * 3,
                        0,
                        this.car.position.z + Math.cos(this.car.rotation.y + Math.PI/2) * 3
                    );
                    this.character.rotation.y = this.car.rotation.y;
                    this.character.visible = true;
                    
                    this.showNotification('Exited vehicle', 'Press E to return');
                } else {
                    const dist = this.character.position.distanceTo(this.car.position);
                    if (dist < 5) {
                        this.state.playerMode = 'driving';
                        this.character.visible = false;
                        this.showNotification('Entered vehicle');
                    } else {
                        this.showNotification('Too far from vehicle', null, '#EF4444');
                    }
                }
            }
            
            toggleCamera() {
                const modes = ['follow', 'orbit', 'first-person'];
                const current = modes.indexOf(this.state.cameraMode);
                this.state.cameraMode = modes[(current + 1) % modes.length];
                this.showNotification(`Camera: ${this.state.cameraMode.replace('-', ' ')}`);
            }
            
            showNotification(text, subtext = null, color = null) {
                const indicator = document.getElementById('sectionIndicator');
                const dot = document.getElementById('indicatorDot');
                const title = document.getElementById('indicatorTitle');
                
                dot.style.backgroundColor = color || 'var(--color-primary)';
                title.textContent = text;
                
                const hint = indicator.querySelector('.section-indicator-hint');
                if (subtext) {
                    hint.textContent = subtext;
                    hint.style.display = 'inline';
                } else {
                    hint.style.display = 'none';
                }
                
                indicator.style.display = 'block';
                
                setTimeout(() => {
                    if (!this.state.currentSection) {
                        indicator.style.display = 'none';
                    }
                }, 3000);
            }
            
            openModal(data) {
                const { title, content, color } = data;
                
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalDot').style.backgroundColor = '#' + new THREE.Color(color).getHexString();
                
                let html = `<p style="margin-bottom: 1.5rem; color: var(--color-text-secondary);">${content.intro}</p>`;
                
                content.sections.forEach(section => {
                    html += `
                        <div class="modal-section">
                            <h3 class="modal-section-title">${section.title}</h3>
                            <ul class="modal-list">
                                ${section.items.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                });
                
                document.getElementById('modalContent').innerHTML = html;
                document.getElementById('modalOverlay').classList.add('active');
            }
            
            closeModal() {
                document.getElementById('modalOverlay').classList.remove('active');
            }
            
            applyQuality(quality) {
                this.state.quality = quality;
                
                this.renderer.shadowMap.enabled = quality !== 'low';
                this.camera.far = quality === 'high' ? 800 : quality === 'medium' ? 400 : 200;
                this.camera.updateProjectionMatrix();
            }
            
            applyEffects(level) {
                if (!this.bloomPass) return;
                
                const settings = {
                    minimal: { strength: 0.1, radius: 0.3, threshold: 0.98 },
                    balanced: { strength: 0.15, radius: 0.25, threshold: 0.95 },
                    ultra: { strength: 0.2, radius: 0.2, threshold: 0.9 }
                };
                
                const s = settings[level];
                this.bloomPass.strength = s.strength;
                this.bloomPass.radius = s.radius;
                this.bloomPass.threshold = s.threshold;
            }
            
            animate() {
                requestAnimationFrame(this.animate);
                
                const delta = this.clock.getDelta();
                
                this.updateMovement(delta);
                this.updateCamera();
                this.checkSectionProximity();
                
                // Update minimap every 5 frames
                if (this.frameCount % 5 === 0) {
                    this.updateMinimap();
                }
                
                // Update FPS every 30 frames
                if (this.frameCount % 30 === 0) {
                    this.updateFPS();
                }
                
                this.frameCount++;
                this.composer.render();
            }
            
            updateMovement(delta) {
                if (this.state.playerMode === 'driving') {
                    this.updateCar(delta);
                } else {
                    this.updateCharacter(delta);
                }
            }
            
            updateCar(delta) {
                const keys = this.state.keys;
                let moving = false;
                
                const boosting = keys['ShiftLeft'] || keys['ShiftRight'];
                const maxSpeed = CONFIG.MAX_SPEED * (boosting ? CONFIG.BOOST_MULTIPLIER : 1);
                const accel = CONFIG.ACCELERATION * (boosting ? CONFIG.BOOST_MULTIPLIER : 1);
                
                // Forward/backward
                if (keys['KeyW'] || keys['ArrowUp']) {
                    this.state.carSpeed = Math.min(this.state.carSpeed + accel, maxSpeed);
                    moving = true;
                } else if (keys['KeyS'] || keys['ArrowDown']) {
                    this.state.carSpeed = Math.max(this.state.carSpeed - accel, -maxSpeed * 0.6);
                    moving = true;
                }
                
                // Steering
                if (Math.abs(this.state.carSpeed) > 0.1) {
                    const turnSpeed = CONFIG.TURN_SPEED * (Math.abs(this.state.carSpeed) / CONFIG.MAX_SPEED);
                    
                    if (keys['KeyA'] || keys['ArrowLeft']) {
                        this.car.rotation.y += turnSpeed;
                        this.car.rotation.z = THREE.MathUtils.lerp(this.car.rotation.z, 0.1, 0.1);
                    } else if (keys['KeyD'] || keys['ArrowRight']) {
                        this.car.rotation.y -= turnSpeed;
                        this.car.rotation.z = THREE.MathUtils.lerp(this.car.rotation.z, -0.1, 0.1);
                    } else {
                        this.car.rotation.z = THREE.MathUtils.lerp(this.car.rotation.z, 0, 0.1);
                    }
                }
                
                // Friction
                if (!moving) {
                    this.state.carSpeed *= (1 - CONFIG.FRICTION);
                    if (Math.abs(this.state.carSpeed) < 0.02) this.state.carSpeed = 0;
                }
                
                // Apply movement
                this.car.position.x += Math.sin(this.car.rotation.y) * this.state.carSpeed;
                this.car.position.z += Math.cos(this.car.rotation.y) * this.state.carSpeed;
                
                // Pitch tilt
                this.car.rotation.x = THREE.MathUtils.lerp(this.car.rotation.x, this.state.carSpeed * 0.05, 0.1);
                
                // Update UI
                const speedKmh = Math.round(Math.abs(this.state.carSpeed) * 50);
                document.getElementById('speedValue').textContent = speedKmh;
                document.getElementById('speedBoost').style.display = boosting ? 'inline-flex' : 'none';
            }
            
            updateCharacter(delta) {
                const keys = this.state.keys;
                const walkSpeed = 0.1;
                
                let moveX = 0, moveZ = 0;
                
                if (keys['KeyW'] || keys['ArrowUp']) moveZ += walkSpeed;
                if (keys['KeyS'] || keys['ArrowDown']) moveZ -= walkSpeed;
                if (keys['KeyA'] || keys['ArrowLeft']) moveX += walkSpeed;
                if (keys['KeyD'] || keys['ArrowRight']) moveX -= walkSpeed;
                
                if (moveX !== 0 || moveZ !== 0) {
                    this.character.rotation.y = Math.atan2(moveX, moveZ);
                    this.character.position.x += Math.sin(this.character.rotation.y) * walkSpeed;
                    this.character.position.z += Math.cos(this.character.rotation.y) * walkSpeed;
                }
                
                document.getElementById('speedValue').textContent = '0';
            }
            
            updateCamera() {
                const target = this.state.playerMode === 'driving' ? this.car : this.character;
                if (!target) return;
                
                let targetPos = new THREE.Vector3();
                let lookPos = new THREE.Vector3();
                
                switch (this.state.cameraMode) {
                    case 'follow':
                        targetPos.set(
                            target.position.x - Math.sin(target.rotation.y) * this.state.cameraDistance,
                            target.position.y + this.state.cameraHeight,
                            target.position.z - Math.cos(target.rotation.y) * this.state.cameraDistance
                        );
                        lookPos.copy(target.position).add(new THREE.Vector3(0, 2, 0));
                        break;
                        
                    case 'orbit':
                        const angle = performance.now() * 0.0005;
                        targetPos.set(
                            target.position.x + Math.sin(angle) * this.state.cameraDistance,
                            target.position.y + this.state.cameraHeight,
                            target.position.z + Math.cos(angle) * this.state.cameraDistance
                        );
                        lookPos.copy(target.position);
                        break;
                        
                    case 'first-person':
                        if (this.state.playerMode === 'driving') {
                            targetPos.copy(this.car.position).add(
                                new THREE.Vector3(
                                    Math.sin(this.car.rotation.y) * 0.5,
                                    1.8,
                                    Math.cos(this.car.rotation.y) * 0.5
                                )
                            );
                            lookPos.copy(targetPos).add(
                                new THREE.Vector3(
                                    Math.sin(this.car.rotation.y) * 10,
                                    0,
                                    Math.cos(this.car.rotation.y) * 10
                                )
                            );
                        } else {
                            targetPos.copy(this.character.position).add(new THREE.Vector3(0, 1.7, 0));
                            lookPos.copy(targetPos).add(
                                new THREE.Vector3(
                                    Math.sin(this.character.rotation.y) * 10,
                                    0,
                                    Math.cos(this.character.rotation.y) * 10
                                )
                            );
                        }
                        break;
                }
                
                this.camera.position.lerp(targetPos, CONFIG.CAMERA_LERP_FACTOR);
                
                const currentDir = new THREE.Vector3();
                this.camera.getWorldDirection(currentDir);
                const targetDir = new THREE.Vector3().subVectors(lookPos, this.camera.position).normalize();
                currentDir.lerp(targetDir, CONFIG.CAMERA_LERP_FACTOR);
                this.camera.lookAt(this.camera.position.clone().add(currentDir));
            }
            
            checkSectionProximity() {
                if (document.getElementById('modalOverlay').classList.contains('active')) return;
                
                const pos = this.state.playerMode === 'driving' ? this.car.position : this.character.position;
                
                let closest = null;
                let closestDist = CONFIG.SECTION_DETECTION_RADIUS;
                
                this.sections.forEach(section => {
                    const dist = pos.distanceTo(section.position);
                    if (dist < closestDist) {
                        closest = section;
                        closestDist = dist;
                    }
                });
                
                if (closest !== this.state.currentSection) {
                    this.state.currentSection = closest;
                    
                    const indicator = document.getElementById('sectionIndicator');
                    const dot = document.getElementById('indicatorDot');
                    const title = document.getElementById('indicatorTitle');
                    const hint = indicator.querySelector('.section-indicator-hint');
                    
                    if (closest) {
                        const color = '#' + new THREE.Color(closest.userData.color).getHexString();
                        dot.style.backgroundColor = color;
                        title.textContent = closest.userData.title;
                        hint.textContent = 'Press SPACE to enter';
                        hint.style.display = 'inline';
                        indicator.style.display = 'block';
                    } else {
                        indicator.style.display = 'none';
                    }
                }
            }
            
            updateMinimap() {
                const canvas = document.getElementById('minimap');
                const ctx = canvas.getContext('2d');
                
                // Clear
                ctx.fillStyle = '#F8FAFC';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Grid
                ctx.strokeStyle = '#E2E8F0';
                ctx.lineWidth = 1;
                for (let i = 0; i <= canvas.width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i <= canvas.height; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const scale = 1.5;
                
                // Buildings
                this.sections.forEach(section => {
                    const x = cx + section.position.x / scale;
                    const y = cy + section.position.z / scale;
                    
                    const color = '#' + new THREE.Color(section.userData.color).getHexString();
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, 7, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#1E293B';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });
                
                // Player
                const playerPos = this.state.playerMode === 'driving' ? this.car.position : this.character.position;
                const playerAngle = this.state.playerMode === 'driving' ? this.car.rotation.y : this.character.rotation.y;
                const px = cx + playerPos.x / scale;
                const py = cy + playerPos.z / scale;
                
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(-playerAngle);
                
                ctx.fillStyle = this.state.playerMode === 'driving' ? '#1E40AF' : '#3B82F6';
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.lineTo(-4, 4);
                ctx.lineTo(4, 4);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
            
            updateFPS() {
                const now = performance.now();
                const delta = now - this.lastFpsTime;
                this.fps = Math.round(30 * 1000 / delta);
                this.lastFpsTime = now;
                document.getElementById('fpsCounter').textContent = `${this.fps} FPS`;
                
                // Auto-adjust quality
                if (this.fps < CONFIG.AUTO_QUALITY_THRESHOLD && this.state.quality !== 'low') {
                    if (this.state.quality === 'high') {
                        document.getElementById('qualitySelect').value = 'medium';
                        this.applyQuality('medium');
                    } else if (this.fps < 20) {
                        document.getElementById('qualitySelect').value = 'low';
                        this.applyQuality('low');
                    }
                }
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================
        
        const engine = new PortfolioEngine();
        engine.init();
    </script>
</body>
</html>
